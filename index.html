<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Pembayaran Otomatis</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Form Pembayaran</h2>
        
        <form id="paymentForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nominal (IDR)</label>
                <input type="number" id="amount" required min="1000" placeholder="Contoh: 50000"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Metode Pembayaran</label>
                <select id="paymentMethod" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="">-- Pilih Metode --</option>
                    <option value="QRIS">QRIS (Otomatis)</option>
                    <option value="DANA">DANA</option>
                    <option value="OVO">OVO</option>
                    <option value="GOPAY">GOPAY</option>
                </select>
            </div>

            <button type="submit" id="btnSubmit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                Bayar Sekarang
            </button>
        </form>

        <div id="resultArea" class="mt-6 hidden border-t pt-4">
            <h3 class="text-lg font-semibold text-gray-800 mb-2">Instruksi Pembayaran</h3>
            <div id="paymentInstructions" class="text-sm text-gray-600 space-y-2">
                </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
